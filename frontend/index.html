<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Upload Screen ─────────────────────────────────────── -->
  <div id="upload-screen" class="screen active">
    <canvas id="grid-canvas" aria-hidden="true"></canvas>
    <button id="upload-theme-btn" class="theme-toggle upload-theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
      <svg id="upload-theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <a id="version-tag" class="version-tag" href="https://github.com/brandon-townes-ai/Log_Reader" target="_blank" rel="noopener"></a>
    <span class="footer-credit">designed by brandon.townes@applied.co</span>
    <div class="upload-content">

      <div class="wordmark">
        <span class="wm-bracket">[</span><span class="wm-text">LOG_READER</span><span class="wm-bracket">]</span>
        <span class="wm-cursor"></span>
      </div>
      <div class="wordmark-sub">ROSBAG · LOG ANALYZER</div>

      <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Upload log files">
        <div class="dz-inner">
          <div class="dz-icon" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <p class="dz-label">Drop log files here</p>
          <p class="dz-sub">or click to browse &mdash; accepts files or a folder of .txt logs</p>
        </div>
        <input type="file" id="file-input" accept=".txt" multiple aria-hidden="true" tabindex="-1">
      </div>

      <div id="error-banner" class="error-banner hidden" role="alert">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-text"></span>
        <button id="retry-btn" class="btn-ghost">RETRY</button>
      </div>

      <div id="loading-overlay" class="loading-overlay hidden" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <span class="loading-text">PARSING LOGS&hellip;</span>
      </div>

    </div>
  </div>

  <!-- ── Viewer Screen ─────────────────────────────────────── -->
  <div id="viewer-screen" class="screen">

    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">[LOG_READER]</span>
        <div class="header-files" id="header-files"></div>
      </div>
      <div class="header-right">
        <span class="entry-count" id="entry-count" aria-live="polite">0 entries</span>
        <button id="viewer-theme-btn" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
          <svg id="viewer-theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="clear-btn" class="btn-ghost">CLEAR / UPLOAD NEW</button>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar" aria-label="Log summary"></div>

    <div class="filter-bar" role="toolbar" aria-label="Log filters">

      <div class="filter-group">
        <span class="filter-label" aria-hidden="true">LEVEL</span>
        <div class="level-pills" id="level-pills" role="group" aria-label="Level filter">
          <button class="pill active" data-level="ALL">ALL</button>
          <button class="pill" data-level="INFO">INFO</button>
          <button class="pill" data-level="DEBUG">DEBUG</button>
          <button class="pill" data-level="WARN">WARN</button>
          <button class="pill" data-level="ERROR">ERROR</button>
          <button class="pill" data-level="FATAL">FATAL</button>
          <button class="pill" data-level="ALWAYS">ALWAYS</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label" aria-hidden="true">PROCESS</span>
        <div class="process-dropdown" id="process-dropdown">
          <button class="dropdown-trigger" id="dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="dropdown-label">All processes</span>
            <svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="dropdown-menu hidden" id="dropdown-menu" role="listbox" aria-multiselectable="true"></div>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label" aria-hidden="true">REPEATS</span>
        <button class="pill" id="collapse-toggle" aria-pressed="false" title="Fold consecutive identical lines">COLLAPSE</button>
      </div>

      <div class="filter-group filter-group--search">
        <span class="filter-label" aria-hidden="true">SEARCH</span>
        <label class="search-wrap">
          <svg class="search-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="search-input" class="search-input" placeholder="filter… regex ok (word.*num)" autocomplete="off" spellcheck="false">
        </label>
        <label class="search-wrap search-wrap--exclude">
          <svg class="search-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          <input type="search" id="exclude-input" class="search-input" placeholder="exclude… regex" autocomplete="off" spellcheck="false">
        </label>
      </div>

      <div class="filter-group filter-group--count">
        <span class="result-count" id="result-count" aria-live="polite"></span>
      </div>

    </div>

    <div class="timeline-bar" id="timeline-bar">
      <canvas id="timeline-canvas"></canvas>
      <div id="timeline-brush"></div>
      <div id="timeline-range" class="timeline-range hidden">
        <span id="range-text"></span>
        <button id="range-clear" title="Clear time range" aria-label="Clear time range">&times;</button>
      </div>
    </div>

    <div class="log-area">
      <div id="log-container" class="log-container" role="log" aria-label="Log entries">
        <div id="spacer-top" aria-hidden="true"></div>
        <div id="log-rows"></div>
        <div id="spacer-bottom" aria-hidden="true"></div>
        <div id="empty-msg" class="empty-msg hidden">No matching entries</div>
      </div>
      <div id="scroll-markers" class="scroll-markers" aria-hidden="true"></div>
    </div>

    <aside id="inspector" class="inspector hidden" aria-label="Log entry detail">
      <div class="inspector-head">
        <span class="inspector-title">ENTRY DETAIL</span>
        <button id="inspector-close" class="theme-toggle" aria-label="Close detail">&times;</button>
      </div>
      <div id="inspector-body" class="inspector-body"></div>
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
